<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Night Sea View</title>

<style>
body{
    margin:0;
    overflow:hidden;
    height:100vh;
    background:linear-gradient(to bottom,#06142e,#0b2248,#102f61);
}

/* ดวงจันทร์ */
.moon{
    position:absolute;
    top:80px;
    right:180px;
    width:120px;
    height:120px;
    background:white;
    border-radius:50%;
    box-shadow:0 0 50px white;
}

/* ทะเล */
.sea{
    position:absolute;
    bottom:0;
    width:100%;
    height:40%;
    background:linear-gradient(to bottom,#0b3a75,#07254a);
}

.wave{
    position:absolute;
    width:200%;
    height:100px;
    top:-30px;
    background:rgba(255,255,255,0.08);
    border-radius:50%;
    animation:wave 8s linear infinite;
}

@keyframes wave{
    from{transform:translateX(0);}
    to{transform:translateX(-300px);}
}

/* ผู้หญิง */
.girl{
    position:absolute;
    bottom:180px;
    left:50%;
    transform:translateX(-50%);
}

.head{
    width:45px;
    height:45px;
    background:#f5d0c5;
    border-radius:50%;
    position:relative;
}

/* ผม */
.hair{
    position:absolute;
    width:55px;
    height:65px;
    background:#111;
    border-radius:50%;
    top:-5px;
    left:-5px;
    transform-origin:top center;
    animation:hairMove 3s ease-in-out infinite;
}

@keyframes hairMove{
    0%{transform:rotate(0deg);}
    50%{transform:rotate(6deg);}
    100%{transform:rotate(0deg);}
}

.body{
    width:55px;
    height:80px;
    background:#222;
    margin-left:-5px;
    border-radius:20px;
}

.leg{
    width:70px;
    height:12px;
    background:#222;
    margin-top:10px;
    border-radius:20px;
}

/* ดาว */
.star{
    position:absolute;
    background:white;
    border-radius:50%;
    animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
    from{opacity:.3;}
    to{opacity:1;}
}
</style>
</head>
<body>

<div class="moon"></div>

<div class="star" style="top:80px;left:100px;width:3px;height:3px;"></div>
<div class="star" style="top:150px;left:300px;width:4px;height:4px;"></div>
<div class="star" style="top:120px;left:600px;width:3px;height:3px;"></div>
<div class="star" style="top:200px;left:900px;width:4px;height:4px;"></div>

<div class="girl">
    <div class="head">
        <div class="hair"></div>
    </div>
    <div class="body"></div>
    <div class="leg"></div>
</div>

<div class="sea">
    <div class="wave"></div>
   <a href="index.html" class="btn">
   <a href="portfolio.html" class="btn">
</div>

</body>
</html>

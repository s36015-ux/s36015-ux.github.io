    <!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>โปรไฟล์ของฉัน</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#667eea,#764ba2);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.card{
    background:white;
    width:100%;
    max-width:700px;
    border-radius:25px;
    padding:50px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,0.25);
}

.avatar{
    width:180px;
    height:180px;
    margin:auto;
    border-radius:50%;
    background:linear-gradient(135deg,#667eea,#764ba2);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:70px;
    font-weight:bold;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

h1{
    margin-top:25px;
    color:#333;
    font-size:2.2rem;
}

.name{
    margin-top:15px;
    font-size:1.5rem;
    font-weight:bold;
    color:#667eea;
}

.info{
    margin-top:20px;
    font-size:1.1rem;
    line-height:1.8;
    color:#555;
}

.skills{
    margin-top:30px;
}

.skill{
    display:inline-block;
    margin:5px;
    padding:10px 18px;
    background:#667eea;
    color:white;
    border-radius:30px;
    font-size:14px;
}

.btn{
    display:inline-block;
    margin-top:30px;
    padding:14px 30px;
    background:#667eea;
    color:white;
    text-decoration:none;
    border-radius:30px;
    font-weight:bold;
    transition:0.3s;
}

.btn:hover{
    background:#4e5dd1;
}

footer{
    margin-top:30px;
    color:#888;
    font-size:14px;
}
</style>

</head>
<body>

<div class="card">

    <div class="avatar">
        EH
    </div>

    <h1>👋 ยินดีต้อนรับ</h1>

    <div class="name">
        เอกครินทร์ หงษ์วิเศษ
    </div>

    <div class="info">
        นักเรียนผู้สนใจด้านเทคโนโลยี<br>
        การเขียนโปรแกรม และการพัฒนาเว็บไซต์
        <br><br>
        เว็บไซต์นี้สร้างขึ้นด้วย HTML และ CSS
        และเผยแพร่ผ่าน GitHub Pages
    </div>

    <div class="skills">
        <span class="skill">HTML</span>
        <span class="skill">CSS</span>
        <span class="skill">JavaScript</span>
        <span class="skill">GitHub</span>
        <span class="skill">Canva</span>
    </div>

    <a href="portfolio.html" class="btn">
        📁 ดูแฟ้มสะสมงาน
    </a>

    <footer>
        © 2026 Ekkarin Portfolio
    </footer>

</div>

</body>
</html>
